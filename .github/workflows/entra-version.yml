name: entra-version

on:
  push:
    branches: [main]
    paths: [codex-rs/**]
  pull_request:
    branches: [main]
    paths: [codex-rs/**]
  workflow_dispatch:

jobs:
  sync-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Determine fork version from upstream releases
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          UPSTREAM_REPO="openai/codex"

          # Get latest stable upstream release (exclude pre-releases)
          latest_stable=$(gh release list --repo "$UPSTREAM_REPO" --limit 50 \
            | grep -v Pre-release \
            | head -1 \
            | awk '{print $1}')

          if [[ -z "$latest_stable" ]]; then
            echo "::error::Could not determine upstream stable release"
            exit 1
          fi

          # Check if we're ahead of stable (alpha territory)
          latest_alpha=$(gh release list --repo "$UPSTREAM_REPO" --limit 5 \
            | head -1 \
            | awk '{print $1}')

          # Extract the major.minor.patch from the latest alpha
          # e.g., "0.119.0-alpha.8" -> "0.119.0"
          upstream_base=$(echo "$latest_alpha" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+).*/\1/')

          if [[ -z "$upstream_base" ]]; then
            upstream_base="$latest_stable"
          fi

          # Count our fork-specific commits since the last merge from upstream
          # This gives us a deterministic build number
          merge_base=$(git merge-base HEAD origin/main 2>/dev/null || echo HEAD)
          fork_commits=$(git rev-list --count "$merge_base"..HEAD 2>/dev/null || echo 1)
          # Minimum build number of 1
          build=$((fork_commits > 0 ? fork_commits : 1))

          fork_version="${upstream_base}-entra.${build}"

          echo "upstream_stable=$latest_stable"
          echo "upstream_base=$upstream_base"
          echo "fork_version=$fork_version"
          echo "fork_version=$fork_version" >> "$GITHUB_OUTPUT"

      - name: Check if version needs updating
        id: check
        shell: bash
        run: |
          set -euo pipefail
          current=$(grep -m1 '^version' codex-rs/Cargo.toml \
            | sed -E 's/version *= *"([^"]+)".*/\1/')
          expected="${{ steps.version.outputs.fork_version }}"

          echo "current=$current"
          echo "expected=$expected"

          if [[ "$current" == "$expected" ]]; then
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version in Cargo.toml
        if: steps.check.outputs.needs_update == 'true' && github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          new_version="${{ steps.version.outputs.fork_version }}"
          sed -i "0,/^version = \".*\"/s//version = \"${new_version}\"/" codex-rs/Cargo.toml
          echo "Updated Cargo.toml version to $new_version"

      - name: Regenerate Cargo.lock
        if: steps.check.outputs.needs_update == 'true' && github.event_name == 'push'
        shell: bash
        working-directory: codex-rs
        run: cargo generate-lockfile

      - name: Commit version update
        if: steps.check.outputs.needs_update == 'true' && github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add codex-rs/Cargo.toml codex-rs/Cargo.lock
          git commit -m "chore: auto-update fork version to ${{ steps.version.outputs.fork_version }}"
          git push

      - name: Report version (PR check)
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          current=$(grep -m1 '^version' codex-rs/Cargo.toml \
            | sed -E 's/version *= *"([^"]+)".*/\1/')
          expected="${{ steps.version.outputs.fork_version }}"
          if [[ "$current" != "$expected" ]]; then
            echo "::warning::Version mismatch: Cargo.toml has '$current', expected '$expected'. Will be auto-updated on merge."
          else
            echo "Version is correct: $current"
          fi
