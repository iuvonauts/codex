# Entra fork release workflow.
#
# Mirrors upstream rust-release.yml build steps but:
# - Triggers on push to main or manual dispatch (not tags)
# - Auto-detects version from upstream releases
# - Patches Cargo.toml at build time (never committed)
# - Skips code signing, npm, winget (OpenAI-specific)

name: entra-release

on:
  push:
    branches: [main]
    paths:
      - codex-rs/**
      - .github/workflows/entra-release.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve version from upstream and prior entra releases
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          # Query upstream releases via public API (no auth needed)
          upstream_releases=$(curl -sf \
            "https://api.github.com/repos/openai/codex/releases?per_page=10")

          # Extract base version from latest release tag
          latest_tag=$(echo "$upstream_releases" \
            | jq -r '.[0].tag_name // empty')
          upstream_base=$(echo "$latest_tag" \
            | sed -E 's/^rust-v//; s/^([0-9]+\.[0-9]+\.[0-9]+).*/\1/')

          # Fall back to latest stable if parsing fails
          if [[ -z "$upstream_base" ]]; then
            upstream_base=$(echo "$upstream_releases" \
              | jq -r '[.[] | select(.prerelease == false)][0].tag_name // empty' \
              | sed -E 's/^rust-v//')
          fi

          if [[ -z "$upstream_base" ]]; then
            echo "::error::Could not determine upstream version"
            exit 1
          fi

          # Increment build number from prior entra releases
          last_entra=$(gh release list --limit 50 2>/dev/null \
            | awk '{print $1}' \
            | grep "^${upstream_base}-entra\." \
            | head -1 || true)

          if [[ -n "$last_entra" ]]; then
            last_build=$(echo "$last_entra" | grep -oP 'entra\.\K[0-9]+')
            build=$((last_build + 1))
          else
            build=1
          fi

          version="${upstream_base}-entra.${build}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $version (upstream base: $upstream_base)"

  build:
    needs: resolve-version
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: read
    defaults:
      run:
        working-directory: codex-rs
    env:
      CARGO_PROFILE_RELEASE_LTO: thin

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Linux bwrap build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev

      # Same pinned toolchain commit as upstream rust-release.yml
      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          targets: ${{ matrix.target }}

      - name: Patch version at build time
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.resolve-version.outputs.version }}"
          sed -i.bak "0,/^version = \".*\"/s//version = \"${version}\"/" Cargo.toml
          rm -f Cargo.toml.bak
          echo "Patched Cargo.toml to version $version"

      - name: Cargo build
        shell: bash
        run: cargo build --target ${{ matrix.target }} --release --bin codex

      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          dest="dist/${{ matrix.target }}"
          mkdir -p "$dest"
          cp target/${{ matrix.target }}/release/codex "$dest/codex-${{ matrix.target }}"

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ${{ matrix.target }}
          path: codex-rs/dist/${{ matrix.target }}/*

  release:
    needs: [resolve-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist

      - name: List artifacts
        run: ls -R dist/

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.resolve-version.outputs.version }}"
          tag="entra-v${version}"

          git tag -a "$tag" -m "Release ${version}"
          git push origin "$tag"

          gh release create "$tag" \
            --title "$version" \
            --generate-notes \
            --prerelease \
            dist/**/*
